server:
  port: ${PORT:8080}
  address: 0.0.0.0

spring:
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/router_watchdog}
    username: ${DATABASE_USERNAME:router_watchdog}
    password: ${DATABASE_PASSWORD:router_watchdog}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true