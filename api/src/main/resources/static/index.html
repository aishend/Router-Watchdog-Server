<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Router Watchdog</title>
    <link rel="stylesheet" href="/css/app.css">
</head>
<body>
    <main class="page">
        <header class="page__header">
            <h1 class="page__title">Router Watchdog</h1>
            <div class="page__update">Page updated <span id="pageUpdatedAgo">now</span></div>
        </header>

        <section class="devices">
            <table class="devices__table">
                <thead>
                    <tr>
                        <th>Device</th>
                        <th>Status</th>
                        <th>Last heartbeat</th>
                    </tr>
                </thead>
                <tbody id="devicesTable">
                    <tr>
                        <td colspan="3" class="devices__empty">Waiting for devices...</td>
                    </tr>
                </tbody>
            </table>
        </section>
    </main>

    <script src="/js/app.js" defer></script>
</body>
</html>
