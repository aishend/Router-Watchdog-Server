services:
  - type: web
    name: router-watchdog-api
    runtime: docker
    rootDir: api
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: router-watchdog-db
          property: connectionString
      - key: DB_USER
        fromDatabase:
          name: router-watchdog-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: router-watchdog-db
          property: password
      - key: DB_NAME
        fromDatabase:
          name: router-watchdog-db
          property: database
      - key: SPRING_JPA_HIBERNATE_DDL_AUTO
        value: update
      - key: SPRING_JPA_SHOW_SQL
        value: "false"

databases:
  - name: router-watchdog-db
    databaseName: router_watchdog
    user: watchdog
    plan: free
